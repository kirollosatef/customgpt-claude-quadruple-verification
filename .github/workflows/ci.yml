name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run tests
        shell: bash
        run: npm test
      - name: Smoke test
        shell: bash
        run: node install/verify.mjs

  test-python:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: pip install pytest
      - name: Run Python tests
        shell: bash
        run: python -m pytest tests/test_*.py -v

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - run: npm ci
      - name: Lint
        run: npm run lint

  pack-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Verify npm pack output
        shell: bash
        run: |
          FILES=$(npm pack --dry-run 2>&1)
          echo "$FILES"
          # Fail if internal files would be included
          if echo "$FILES" | grep -qE '(conversation\.txt|research\.md|\.planning|benchmark|python/)'; then
            echo "::error::Internal files found in npm pack output!"
            exit 1
          fi

  version-check:
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check version was bumped
        shell: bash
        run: |
          PR_VERSION=$(node -p "require('./package.json').version")
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")
          echo "PR version:   $PR_VERSION"
          echo "Base version:  $BASE_VERSION"
          if [ "$PR_VERSION" = "$BASE_VERSION" ]; then
            echo "::error::package.json version ($PR_VERSION) was not bumped. Every PR must include a version bump."
            exit 1
          fi
          echo "Version bumped: $BASE_VERSION → $PR_VERSION"
