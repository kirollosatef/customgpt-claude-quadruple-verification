name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Run tests
        shell: bash
        run: node --test tests/test-cycle1.mjs tests/test-cycle2.mjs tests/test-cycle4.mjs tests/test-audit.mjs tests/test-config.mjs tests/test-e2e.mjs tests/test-edge-cases.mjs tests/test-enhanced-prompt.mjs tests/test-llm-advisor.mjs
      - name: Smoke test
        shell: bash
        run: node install/verify.mjs
