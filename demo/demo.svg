<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520" font-family="'Cascadia Code','SF Mono','Consolas','Monaco','Menlo',monospace" font-size="13">
  <style>
    /* 21s total: 7s per scene, instant cut between scenes */
    @keyframes s1 { 0%   { opacity:1 } 33.33% { opacity:0 } 100%   { opacity:0 } }
    @keyframes s2 { 0%   { opacity:0 } 33.33% { opacity:1 } 66.66% { opacity:0 } 100%   { opacity:0 } }
    @keyframes s3 { 0%   { opacity:0 } 66.66% { opacity:1 } 100%   { opacity:0 } }

    /* Banner slides in after typing finishes */
    @keyframes pop { 0%,35% { opacity:0 } 42% { opacity:1 } 100% { opacity:1 } }

    /* Typing reveal */
    @keyframes t1 { 0% { width:0 } 20% { width:375px } 100% { width:375px } }
    @keyframes t2 { 0% { width:0 } 20% { width:350px } 100% { width:350px } }
    @keyframes t3 { 0% { width:0 } 20% { width:395px } 100% { width:395px } }

    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

    .s1 { animation: s1 21s step-end infinite }
    .s2 { animation: s2 21s step-end infinite }
    .s3 { animation: s3 21s step-end infinite }
    .pop { animation: pop 7s ease infinite }
    .t1 { animation: t1 7s ease infinite; overflow:hidden }
    .t2 { animation: t2 7s ease infinite; overflow:hidden }
    .t3 { animation: t3 7s ease infinite; overflow:hidden }
    .blink { animation: blink 1s step-end infinite }
  </style>

  <defs>
    <clipPath id="c1"><rect class="t1" x="0" y="0" width="375" height="22"/></clipPath>
    <clipPath id="c2"><rect class="t2" x="0" y="0" width="350" height="22"/></clipPath>
    <clipPath id="c3"><rect class="t3" x="0" y="0" width="395" height="22"/></clipPath>
  </defs>

  <!-- Terminal background -->
  <rect width="850" height="520" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="850" height="36" rx="10" fill="#313244"/>
  <rect y="26" width="850" height="10" fill="#313244"/>
  <circle cx="20" cy="18" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="18" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="18" r="6" fill="#a6e3a1"/>
  <text x="425" y="22" fill="#cdd6f4" text-anchor="middle" font-size="12" font-weight="600">Quadruple Verification — Live Demo</text>

  <!-- ====== SCENE 1: eval() blocked ====== -->
  <g class="s1">
    <!-- Clear area -->
    <rect x="0" y="36" width="850" height="452" fill="#1e1e2e"/>

    <!-- Prompt -->
    <text x="20" y="68" fill="#89b4fa" font-weight="bold">claude&gt;</text>
    <g clip-path="url(#c1)" transform="translate(78,50)">
      <text x="0" y="18" fill="#cdd6f4">"Write a function using eval()"</text>
    </g>

    <!-- Code -->
    <text x="20" y="104" fill="#585b70">Claude tries to write:</text>
    <rect x="20" y="115" width="500" height="75" rx="5" fill="#181825"/>
    <text x="32" y="137" fill="#89b4fa">def</text>
    <text x="58" y="137" fill="#a6e3a1"> parse_input</text>
    <text x="155" y="137" fill="#cdd6f4">(user_input):</text>
    <text x="52" y="159" fill="#cba6f7">return</text>
    <text x="107" y="159" fill="#f38ba8"> eval</text>
    <text x="139" y="159" fill="#cdd6f4">(user_input)</text>
    <text x="52" y="180" fill="#585b70"># Dangerous! Arbitrary code execution</text>

    <!-- BLOCKED -->
    <g class="pop">
      <rect x="20" y="208" width="810" height="125" rx="6" fill="#2a1525" stroke="#f38ba8" stroke-width="2"/>
      <rect x="20" y="208" width="810" height="30" rx="6" fill="#f38ba8"/>
      <rect x="20" y="228" width="810" height="10" fill="#f38ba8"/>
      <text x="40" y="228" fill="#1e1e2e" font-weight="bold" font-size="14">BLOCKED — PreToolUse:Write hook</text>
      <text x="40" y="262" fill="#f38ba8" font-weight="bold">Cycle 2 — Security Violation</text>
      <text x="40" y="287" fill="#f9e2af">Rule: </text>
      <text x="90" y="287" fill="#cdd6f4">no-eval — eval() detected on line 2</text>
      <text x="40" y="312" fill="#a6e3a1">Fix:  </text>
      <text x="85" y="312" fill="#cdd6f4">Use JSON.parse() for JSON, or ast.literal_eval() for Python</text>
    </g>
  </g>

  <!-- ====== SCENE 2: Research claims blocked ====== -->
  <g class="s2" opacity="0">
    <!-- Clear area -->
    <rect x="0" y="36" width="850" height="452" fill="#1e1e2e"/>

    <!-- Prompt -->
    <text x="20" y="68" fill="#89b4fa" font-weight="bold">claude&gt;</text>
    <g clip-path="url(#c2)" transform="translate(78,50)">
      <text x="0" y="18" fill="#cdd6f4">"Write about AI adoption rates"</text>
    </g>

    <!-- Code -->
    <text x="20" y="104" fill="#585b70">Claude tries to write research.md:</text>
    <rect x="20" y="115" width="600" height="75" rx="5" fill="#181825"/>
    <text x="32" y="137" fill="#cdd6f4">## AI Adoption in Enterprise</text>
    <text x="32" y="159" fill="#f38ba8">Studies show</text>
    <text x="127" y="159" fill="#cdd6f4"> that </text>
    <text x="163" y="159" fill="#f9e2af">80% of enterprises</text>
    <text x="320" y="159" fill="#cdd6f4"> have adopted AI</text>
    <text x="32" y="180" fill="#cdd6f4">tools in their development workflow...</text>

    <!-- BLOCKED -->
    <g class="pop">
      <rect x="20" y="208" width="810" height="150" rx="6" fill="#2a1525" stroke="#f38ba8" stroke-width="2"/>
      <rect x="20" y="208" width="810" height="30" rx="6" fill="#f38ba8"/>
      <rect x="20" y="228" width="810" height="10" fill="#f38ba8"/>
      <text x="40" y="228" fill="#1e1e2e" font-weight="bold" font-size="14">BLOCKED — PreToolUse:Write hook</text>
      <text x="40" y="262" fill="#f38ba8" font-weight="bold">Cycle 4 — Research Claim Violations (2 issues)</text>
      <text x="40" y="289" fill="#f9e2af">1. </text>
      <text x="62" y="289" fill="#cdd6f4">Vague language: "Studies show" — cite a specific study</text>
      <text x="40" y="314" fill="#f9e2af">2. </text>
      <text x="62" y="314" fill="#cdd6f4">Unverified statistic: "80%" — add source URL within 300 chars</text>
      <text x="40" y="340" fill="#a6e3a1">Fix: </text>
      <text x="82" y="340" fill="#cdd6f4">Add &lt;!-- VERIFIED --&gt; tag and cite source URL for each claim</text>
    </g>
  </g>

  <!-- ====== SCENE 3: Clean code passes ====== -->
  <g class="s3" opacity="0">
    <!-- Clear area -->
    <rect x="0" y="36" width="850" height="452" fill="#1e1e2e"/>

    <!-- Prompt -->
    <text x="20" y="68" fill="#89b4fa" font-weight="bold">claude&gt;</text>
    <g clip-path="url(#c3)" transform="translate(78,50)">
      <text x="0" y="18" fill="#cdd6f4">"Create a safe data processing function"</text>
    </g>

    <!-- Code -->
    <text x="20" y="104" fill="#585b70">Claude writes clean code:</text>
    <rect x="20" y="115" width="600" height="95" rx="5" fill="#181825"/>
    <text x="32" y="137" fill="#89b4fa">def</text>
    <text x="58" y="137" fill="#a6e3a1"> process_data</text>
    <text x="155" y="137" fill="#cdd6f4">(data: list[dict]) -&gt; list[dict]:</text>
    <text x="52" y="159" fill="#cba6f7">if not</text>
    <text x="106" y="159" fill="#cdd6f4"> data:</text>
    <text x="72" y="179" fill="#cba6f7">return</text>
    <text x="127" y="179" fill="#cdd6f4"> []</text>
    <text x="52" y="199" fill="#cba6f7">return</text>
    <text x="107" y="199" fill="#cdd6f4"> [i </text>
    <text x="132" y="199" fill="#cba6f7">for</text>
    <text x="156" y="199" fill="#cdd6f4"> i </text>
    <text x="171" y="199" fill="#cba6f7">in</text>
    <text x="189" y="199" fill="#cdd6f4"> data </text>
    <text x="224" y="199" fill="#cba6f7">if</text>
    <text x="242" y="199" fill="#cdd6f4"> i.get(</text>
    <text x="288" y="199" fill="#a6e3a1">"active"</text>
    <text x="346" y="199" fill="#cdd6f4">)]</text>

    <!-- PASSED -->
    <g class="pop">
      <rect x="20" y="228" width="810" height="140" rx="6" fill="#152515" stroke="#a6e3a1" stroke-width="2"/>
      <rect x="20" y="228" width="810" height="30" rx="6" fill="#a6e3a1"/>
      <rect x="20" y="248" width="810" height="10" fill="#a6e3a1"/>
      <text x="40" y="248" fill="#1e1e2e" font-weight="bold" font-size="14">PASSED — All 4 verification cycles clear</text>
      <text x="55" y="284" fill="#a6e3a1" font-size="15">&#x2714;</text>
      <text x="78" y="284" fill="#cdd6f4">Cycle 1 — Code Quality: No placeholders or TODOs</text>
      <text x="55" y="308" fill="#a6e3a1" font-size="15">&#x2714;</text>
      <text x="78" y="308" fill="#cdd6f4">Cycle 2 — Security: No eval, secrets, or injection risks</text>
      <text x="55" y="332" fill="#a6e3a1" font-size="15">&#x2714;</text>
      <text x="78" y="332" fill="#cdd6f4">Cycle 3 — Output Quality: AI self-review passed</text>
      <text x="55" y="356" fill="#a6e3a1" font-size="15">&#x2714;</text>
      <text x="78" y="356" fill="#cdd6f4">Cycle 4 — Audit logged to .claude/quadruple-verify-audit/</text>
    </g>
  </g>

  <!-- Bottom bar -->
  <rect y="488" width="850" height="32" fill="#313244"/>
  <rect y="488" width="850" height="2" fill="#45475a"/>
  <text x="20" y="509" fill="#585b70" font-size="11">customgpt-claude-quadruple-verification v2.0.0</text>
  <text x="620" y="509" fill="#585b70" font-size="11">28 rules  |  4 cycles  |  0 deps</text>

  <!-- Cursor -->
  <rect class="blink" x="450" y="55" width="8" height="15" fill="#f5e0dc" rx="1"/>
</svg>
